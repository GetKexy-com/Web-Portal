<div class="canvas-content-wrap">
  <div class="head-area">
    <p>{{ canvasTitle }} Company Description</p>
    <img src="/assets/images/close-icon.png" alt="Close" (click)="activeCanvas.dismiss('Cross click')" />
  </div>

  <div class="canvas-body">
    <form [formGroup]="primaryForm" (ngSubmit)="handleSubmit()">
      <div class="mb-4">
        <div class="row">
          <div class="col-12">
            <div class="input-wrap">
              <div class="label-and-input">
                <p>Company Name</p>
                <input class="form-control" formControlName="companyName" type="text" placeholder="Name" />
                <div *ngIf="formValidationErrorCheck('companyName')">
                  <error-message-card message="Field is required!"></error-message-card>
                </div>
              </div>

            </div>
          </div>
          <div class="col-12">
            <div class="input-wrap">
              <div class="label-and-input">
                <p>Company Description</p>
                <textarea class="form-control" formControlName="description" type="text" placeholder="Description"></textarea>
                <div *ngIf="formValidationErrorCheck('description')">
                  <error-message-card message="Field is required!"></error-message-card>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-3">
        <app-kexy-button
          type="submit"
          class="flex-grow-1"
          [disabled]="isLoading"
          label="Save changes"
        />
        <app-kexy-button
          type="button"
          class="flex-grow-1"
          [bgColor]="'transparent'"
          textColor="black"
          [borderColor]="'#8c8c8c'"
          (click)="activeCanvas.dismiss('Cross click')"
          label="Cancel"
        />
      </div>


<!--      <div class="buttons">-->
<!--        <button class="blue-button me-3" type="submit" [disabled]="isLoading">-->
<!--          Save<i *ngIf="isLoading" class="fa fa-spinner fa-spin ms-2" aria-hidden="true" style="color: white"></i>-->
<!--        </button>-->
<!--        <button class="blue-border-white-bg-button" type="button" (click)="activeCanvas.dismiss('Cross click')">-->
<!--          Cancel-->
<!--        </button>-->
<!--      </div>-->
    </form>
  </div>
</div>
