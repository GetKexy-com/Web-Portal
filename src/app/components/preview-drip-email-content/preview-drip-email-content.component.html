<div class="canvas-content-wrap">
  <div class="head-area">
    <p><i class="fa fa-envelope-open-o pe-2"></i> Preview Email</p>
    <div class="d-flex">
      <app-kexy-button
        class="me-3"
        label="Spin Another Version"
        bgColor="transparent"
        [borderColor]="'#0047cc'"
        [textColor]="'#0047cc'"
        iconLeft="fa-refresh"
        (click)="spinEmail()"
      ></app-kexy-button>
      <app-kexy-button
        style="margin-right: 10px"
        label="Close"
        iconLeft="fa-close"
        bgColor="#e7f6fe"
        textColor="#2847cc"
        (click)="activeCanvas.dismiss('Cross click')"
      ></app-kexy-button>
    </div>
  </div>

  <!-- Gmail-style "open email" reading pane — header chrome only, then the
       rendered email body in the iframe below. -->
  <div class="reading-pane">
    <div class="mail-subject-row">
      <h1 class="mail-subject">{{ emailSubject || '(no subject)' }}</h1>
      <span class="mail-label">Inbox</span>
    </div>

    <div class="mail-meta-row">
      <div class="avatar" [style.background]="avatarColor">{{ senderInitials }}</div>

      <div class="sender-meta">
        <div class="sender-line">
          <span class="sender-name">{{ senderName }}</span>
          <span class="sender-email">&lt;{{ senderEmail }}&gt;</span>
        </div>
        <div class="to-line">
          to me <i class="fa fa-caret-down"></i>
        </div>
      </div>

      <div class="mail-actions">
        <span class="mail-date">{{ sentDate | date: 'MMM d, y, h:mm a' }}</span>
        <i class="fa fa-star-o" title="Star"></i>
        <i class="fa fa-reply" title="Reply"></i>
        <i class="fa fa-ellipsis-v" title="More"></i>
      </div>
    </div>

    <div class="preview-stage">
      <iframe #previewFrame title="Email preview"></iframe>
    </div>
  </div>
</div>
