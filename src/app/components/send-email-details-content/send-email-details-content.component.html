<div class="canvas-content-wrap">
  <div class="head-area">
    <p>Email Details</p>
    <img src="/assets/images/close-icon.png" alt="Close" (click)="activeCanvas.dismiss('Cross click')" />
  </div>

  <div class="canvas-body">
    <form (ngSubmit)="handleSubmit()">
      <div class="input-wrap">

        <!--Email Tones-->
        <div class="label-and-input d-flex align-items-end" style="border-bottom: 1px solid #E7F6FE">
          <kexy-select-dropdown
            label="Email Tone"
            shortNoteBesideLabel=""
            [selectAllBtn]="false"
            [required]="false"
            [options]="emailTones"
            [addNewBtn]="false"
            [onAddNewClick]=""
            [selectedOption]="selectedEmailToneKey"
            [onSelectSingleItem]="onEmailToneSelect"
            [editIcon]="false"
            [deleteIcon]="false"
            [onDeleteClick]=""
            [onEditClick]=""
            optionStyle="button"
            backgroundColor="white"
            placeholder="Please Select"
            style="flex: 1"
          ></kexy-select-dropdown>
          <kexy-select-dropdown
            style="margin-left: 10px"
            label="Email Length"
            shortNoteBesideLabel=""
            [selectAllBtn]="false"
            [required]="false"
            [options]="emailLengthKeys"
            [addNewBtn]="false"
            [onAddNewClick]=""
            [selectedOption]="selectedEmailLength ? selectedEmailLength['value'] : ''"
            [onSelectSingleItem]="onEmailLengthSelect"
            [rowIndex]="1"
            [editIcon]="false"
            [deleteIcon]="false"
            [onDeleteClick]=""
            [onEditClick]=""
            [isSearchAble]="false"
            optionStyle="button"
            backgroundColor="white"
            placeholder="Please Select"
          ></kexy-select-dropdown>
          <app-kexy-button
            *ngIf="this.dripEmail.templateOptions !== 'template'"
            [label]="isLoading ? 'Please wait...' : 'Generate Email' "
            [disabled]="generateEmailOrSaveDisabled()"
            [title]="disableTitle"
            [iconLeft]="isLoading ? 'fa-refresh fa-spin' : 'fa-refresh'"
            (click)="generateEmailContent()"
            class="ms-2"
            style="min-width: fit-content"
          ></app-kexy-button>
        </div>

        <!--Subject line + body: both live inside the editor (subject supports merge-tag chips)-->
        <div class="label-and-input">
          <p>Tweak the Email to your liking!</p>
          <div class="ckeditor-wrap">
            <kexy-custom-rich-editor
              [content]="emailContent"
              [subject]="emailSubject"
              (subjectChanged)="emailSubject = $event"
            ></kexy-custom-rich-editor>
          </div>
          <div *ngIf="!emailSubject">
            <error-message-card message="Subject line is required!"></error-message-card>
          </div>
        </div>

        <div class="label-and-input">
          <div class="form-check checkbox-and-label">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              [checked]="isCheckedAddUnsubscribeLink"
              (change)="handleCheckboxClick()"
              id="purchase"
            />
            <label class="form-check-label purchase-info-label" for="purchase">
              Add unsubscribe link
            </label>
          </div>
        </div>
      </div>

      <div class="bottom-buttons">
        <app-kexy-button
          style="width: 50%; margin-right: 10px"
          [label]="isLoading ? 'Please wait...' : 'Save' "
          [title]="disableTitle"
          [disabled]="generateEmailOrSaveDisabled()"
          [iconLeft]="isLoading ? 'fa-refresh fa-spin' : 'fa-cloud-upload'"
          type="submit"
        ></app-kexy-button>
        <app-kexy-button
          style="width: 50%"
          label="Cancel"
          bgColor="white"
          textColor="#010101"
          borderColor="#d9d9d9"
          (click)="activeCanvas.dismiss('Cross click')"
        ></app-kexy-button>
      </div>
    </form>
  </div>
</div>
